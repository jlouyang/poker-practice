# Railway config-as-code: build from Dockerfile, health check, restart policy.
# See https://docs.railway.app/config-as-code/reference

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
